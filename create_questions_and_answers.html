<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot FAQ Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center">Chatbot FAQ Management</h1>
        <form id="faqForm" class="mt-4">
            <div class="mb-3">
                <label for="question" class="form-label">Question</label>
                <input type="text" class="form-control" id="question" placeholder="Enter the question" required>
            </div>
            <div class="mb-3">
                <label for="answer" class="form-label">Answer</label>
                <textarea class="form-control" id="answer" rows="3" placeholder="Enter the answer" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>

        <h2 class="mt-5">FAQs</h2>
        <table class="table table-bordered mt-3">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Question</th>
                    <th>Answer</th>
                </tr>
            </thead>
            <tbody id="faqTable">
                <!-- FAQ entries will be dynamically loaded here -->
            </tbody>
        </table>
    </div>

    <script>
        const apiBaseUrl = 'http://127.0.0.1:5000'; // Replace with your Flask API base URL

        // Function to fetch FAQs from the database and display them
        async function loadFAQs() {
            try {
                const response = await axios.get(`${apiBaseUrl}/faqs`);
                const faqs = response.data;

                const faqTable = document.getElementById('faqTable');
                faqTable.innerHTML = '';

                faqs.forEach(faq => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${faq.id}</td>
                        <td>${faq.question}</td>
                        <td>${faq.answer}</td>
                    `;
                    faqTable.appendChild(row);
                });
            } catch (error) {
                console.error('Error loading FAQs:', error);
            }
        }

        // Function to handle form submission
        document.getElementById('faqForm').addEventListener('submit', async function (event) {
            event.preventDefault();

            const question = document.getElementById('question').value;
            const answer = document.getElementById('answer').value;

            try {
                await axios.post(`${apiBaseUrl}/add_faq`, { question, answer });
                alert('FAQ added successfully!');

                // Clear the form
                document.getElementById('faqForm').reset();

                // Reload FAQs
                loadFAQs();
            } catch (error) {
                console.error('Error adding FAQ:', error);
                alert('Failed to add FAQ.');
            }
        });

        // Initial load of FAQs
        loadFAQs();
    </script>
</body>
</html>
